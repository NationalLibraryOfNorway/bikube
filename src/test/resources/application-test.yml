alma:
  api-key: SECRETKEY

search-index:
  enabled: false

app.scheduling.enabled: false

collections.direct-link: http://collections.com/link/{id}

maxit:
  url: http://localhost:8080/maxit

collections:
  lref:
    mavisId: mavisIdLref
    argang: argangLref
    avisnr: avisnrLref
    versjon: versjonLref
    original-tittel: originalTittelLref
    alternativ-tittel: alternativTittelLref
    medium-tekst: mediumTekstLref
    submedium-aviser: submediumAviserLref
    item-status-pliktavlevert: itemStatusPliktavlevertLref


spring:
  datasource:
    url: jdbc:h2:mem:bikube;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS HUGIN\;CREATE SCHEMA IF NOT EXISTS MAXIT
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.hbm2ddl.create_namespaces: true
  security:
    oauth2:
      client:
        registration:
          keycloak-hugin:
            client-id: PLACEHOLDER_KEYCLOAK_CLIENT_ID
        provider:
          keycloak:
            issuer-uri: PLACEHOLDER_ISSUER_URI

vaadin:
  launch-browser: false
