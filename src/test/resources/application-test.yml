alma:
  api-key: SECRETKEY

search-index:
  enabled: false

app.scheduling.enabled: false

collections.direct-link: http://collections.com/link/{id}

maxit:
  url: http://localhost:8080/maxit

featureflag:
  maxit-id: false

collections:
  lref:
    mavisId: mavisIdLref
    argang: argangLref
    avisnr: avisnrLref
    versjon: versjonLref
    original-tittel: originalTittelLref
    alternativ-tittel: alternativTittelLref
    medium-tekst: mediumTekstLref
    submedium-aviser: submediumAviserLref
    item-status-pliktavlevert: itemStatusPliktavlevertLref


spring:
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        hbm2ddl:
          create_namespaces: true
  security:
    oauth2:
      client:
        registration:
          keycloak-hugin:
            client-id: test-client
            authorization-grant-type: authorization_code
          keycloak-collections:
            client-id: test-collections-client
            client-secret: test-secret
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            jwk-set-uri: http://localhost:9999/protocol/openid-connect/certs
            authorization-uri: http://localhost:9999/protocol/openid-connect/auth
            token-uri: http://localhost:9999/protocol/openid-connect/token
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/protocol/openid-connect/certs
